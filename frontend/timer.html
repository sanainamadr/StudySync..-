<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Study Timer — StudySync</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'DM Sans', sans-serif; background: #0f172a; color: #e2e8f0; min-height:100vh; }
    .grad { background: linear-gradient(135deg, #6ee7b7, #3b82f6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .card { background: #1e293b; border: 1px solid #334155; border-radius: 1rem; }
    .nav { background:#1e293b; border-bottom:1px solid #334155; padding:1rem 2rem; display:flex; align-items:center; justify-content:space-between; }
    .nav-links a { color:#94a3b8; font-size:0.9rem; text-decoration:none; padding: 0.4rem 0.9rem; border-radius:0.5rem; transition:all 0.2s; }
    .nav-links a:hover, .nav-links a.active { color:#6ee7b7; background:#0f172a; }

    /* Timer ring */
    .ring-wrap { position:relative; width:260px; height:260px; margin:0 auto; }
    .ring-wrap svg { transform: rotate(-90deg); }
    #timerRing { transition: stroke-dashoffset 1s linear; }
    .timer-display { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); text-align:center; }
    .timer-digits { font-family:'DM Mono',monospace; font-size:3.5rem; font-weight:500; letter-spacing:-2px; }
    .timer-label { font-size:0.85rem; color:#94a3b8; margin-top:0.25rem; }

    .btn { padding:0.75rem 1.75rem; border-radius:0.75rem; font-weight:700; cursor:pointer; border:none; font-size:0.95rem; transition:all 0.2s; }
    .btn-start { background:linear-gradient(135deg,#6ee7b7,#3b82f6); color:#0f172a; }
    .btn-reset { background:#334155; color:#e2e8f0; }
    .btn:hover { opacity:0.85; transform:translateY(-1px); }

    .mode-btn { padding:0.4rem 1rem; border-radius:0.5rem; font-size:0.85rem; cursor:pointer; border:none; transition:all 0.2s; }
    .mode-btn.active { background:#6ee7b7; color:#0f172a; font-weight:700; }
    .mode-btn:not(.active) { background:#334155; color:#94a3b8; }

    .session-item { display:flex; align-items:center; justify-content:space-between; padding:0.6rem 0; border-bottom:1px solid #334155; font-size:0.9rem; }
  </style>
</head>
<body>

<nav class="nav">
  <div style="font-family:'Syne',sans-serif;" class="font-black text-xl">Study<span class="grad">Sync</span></div>
  <div class="nav-links flex gap-1">
    <a href="dashboard.html">Dashboard</a>
    <a href="timer.html" class="active">Timer</a>
    <a href="tasks.html">Tasks</a>
    <a href="notes.html">Notes</a>
    <a href="profile.html">Profile</a>
  </div>
  <button onclick="logout()" class="text-slate-500 hover:text-red-400 text-sm transition">Logout</button>
</nav>

<div class="max-w-2xl mx-auto px-6 py-10">
  <h1 class="text-3xl font-black mb-2" style="font-family:'Syne',sans-serif;">Pomodoro <span class="grad">Timer</span></h1>
  <p class="text-slate-400 mb-8">Focus for 25 minutes, then take a 5-minute break. Repeat!</p>

  <!-- Mode selector -->
  <div class="flex gap-2 justify-center mb-8">
    <button class="mode-btn active" id="modeWork" onclick="setMode('work')">🎯 Focus (25 min)</button>
    <button class="mode-btn" id="modeShort" onclick="setMode('short')">☕ Short Break (5 min)</button>
    <button class="mode-btn" id="modeLong" onclick="setMode('long')">🛋️ Long Break (15 min)</button>
  </div>

  <!-- Timer ring -->
  <div class="card p-8 mb-6 text-center">
    <div class="ring-wrap mb-6">
      <svg width="260" height="260" viewBox="0 0 260 260">
        <circle cx="130" cy="130" r="110" fill="none" stroke="#334155" stroke-width="14"/>
        <circle id="timerRing" cx="130" cy="130" r="110" fill="none" stroke="url(#grad)" stroke-width="14"
          stroke-linecap="round" stroke-dasharray="691" stroke-dashoffset="0"/>
        <defs>
          <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#6ee7b7"/>
            <stop offset="100%" style="stop-color:#3b82f6"/>
          </linearGradient>
        </defs>
      </svg>
      <div class="timer-display">
        <div class="timer-digits" id="timerDigits">25:00</div>
        <div class="timer-label" id="timerStatus">Ready to focus</div>
      </div>
    </div>

    <div class="flex gap-3 justify-center">
      <button class="btn btn-start" id="startBtn" onclick="toggleTimer()">▶ Start</button>
      <button class="btn btn-reset" onclick="resetTimer()">↺ Reset</button>
    </div>
  </div>

  <!-- Today's sessions -->
  <div class="card p-5">
    <h2 class="font-bold mb-3" style="font-family:'Syne',sans-serif;">Today's Sessions</h2>
    <div id="sessionList">
      <p class="text-slate-500 text-sm">No sessions yet today. Start the timer!</p>
    </div>
    <div class="mt-3 text-sm text-emerald-400 font-semibold" id="todayTotal"></div>
  </div>
</div>

<script>
const userId = localStorage.getItem('userId');
if (!userId) window.location.href = 'login.html';

const MODES = { work: 25*60, short: 5*60, long: 15*60 };
const LABELS = { work: 'Focus session', short: 'Short break', long: 'Long break' };
let currentMode = 'work';
let timeLeft = MODES.work;
let totalTime = MODES.work;
let interval = null;
let isRunning = false;
let todaySessions = [];

function setMode(mode) {
  if (isRunning) return;
  currentMode = mode;
  timeLeft = totalTime = MODES[mode];
  updateDisplay();
  ['work','short','long'].forEach(m => {
    document.getElementById('mode' + m.charAt(0).toUpperCase() + m.slice(1)).classList.toggle('active', m === mode);
  });
}

function toggleTimer() {
  if (isRunning) {
    clearInterval(interval);
    isRunning = false;
    document.getElementById('startBtn').textContent = '▶ Resume';
    document.getElementById('timerStatus').textContent = 'Paused';
  } else {
    isRunning = true;
    document.getElementById('startBtn').textContent = '⏸ Pause';
    document.getElementById('timerStatus').textContent = currentMode === 'work' ? '🎯 Focusing...' : '☕ Resting...';
    interval = setInterval(() => {
      timeLeft--;
      updateDisplay();
      if (timeLeft <= 0) {
        clearInterval(interval);
        isRunning = false;
        onTimerComplete();
      }
    }, 1000);
  }
}

function resetTimer() {
  clearInterval(interval);
  isRunning = false;
  timeLeft = totalTime = MODES[currentMode];
  updateDisplay();
  document.getElementById('startBtn').textContent = '▶ Start';
  document.getElementById('timerStatus').textContent = 'Ready to focus';
}

function updateDisplay() {
  const m = Math.floor(timeLeft / 60).toString().padStart(2, '0');
  const s = (timeLeft % 60).toString().padStart(2, '0');
  document.getElementById('timerDigits').textContent = `${m}:${s}`;
  const circumference = 691;
  const progress = (totalTime - timeLeft) / totalTime;
  document.getElementById('timerRing').style.strokeDashoffset = circumference * (1 - progress);
}

async function onTimerComplete() {
  document.getElementById('startBtn').textContent = '▶ Start';
  document.getElementById('timerStatus').textContent = currentMode === 'work' ? '✅ Session complete!' : '✅ Break done!';

  if (currentMode === 'work') {
    const minutes = MODES.work / 60;
    todaySessions.push(minutes);
    renderSessions();

    // Log to backend
    try {
      const res = await fetch('http://localhost:8080/api/sessions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId: parseInt(userId), durationMinutes: minutes })
      });
      const data = await res.json();
      if (data.streakCount !== undefined) {
        localStorage.setItem('streakCount', data.streakCount);
      }
    } catch (e) { console.error('Failed to log session', e); }

    alert('🎉 Focus session complete! Take a well-deserved break.');
  }
}

function renderSessions() {
  const total = todaySessions.reduce((a, b) => a + b, 0);
  const el = document.getElementById('sessionList');
  if (todaySessions.length === 0) {
    el.innerHTML = '<p class="text-slate-500 text-sm">No sessions yet today. Start the timer!</p>';
    document.getElementById('todayTotal').textContent = '';
    return;
  }
  el.innerHTML = todaySessions.map((m, i) => `
    <div class="session-item">
      <span>Session ${i + 1}</span>
      <span class="text-emerald-400">${m} minutes</span>
    </div>
  `).join('');
  document.getElementById('todayTotal').textContent = `Total today: ${total} minutes (${(total/60).toFixed(1)} hrs)`;
}

function logout() { localStorage.clear(); window.location.href = 'login.html'; }

updateDisplay();
</script>
</body>
</html>
