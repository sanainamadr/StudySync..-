<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up — StudySync</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'DM Sans', sans-serif; background: #0f172a; color: #e2e8f0; min-height:100vh; display:flex; align-items:center; justify-content:center; }
    .grad { background: linear-gradient(135deg, #6ee7b7, #3b82f6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .card { background: #1e293b; border: 1px solid #334155; border-radius: 1.25rem; padding: 2.5rem; width: 100%; max-width: 420px; }
    input { background: #0f172a; border: 1px solid #334155; border-radius: 0.625rem; padding: 0.75rem 1rem; width:100%; color:#e2e8f0; outline:none; transition: border 0.2s; }
    input:focus { border-color: #6ee7b7; }
    .btn { background: linear-gradient(135deg, #6ee7b7, #3b82f6); color: #0f172a; font-weight: 700; padding: 0.875rem; border-radius: 0.75rem; width:100%; cursor:pointer; border:none; font-size:1rem; transition: opacity 0.2s; }
    .btn:hover { opacity: 0.85; }
    .error { color: #f87171; font-size: 0.85rem; margin-top: 0.5rem; display:none; }
    .success { color: #6ee7b7; font-size: 0.85rem; margin-top: 0.5rem; display:none; }
  </style>
</head>
<body>
<div class="card">
  <div class="text-center mb-8">
    <div class="text-3xl font-black mb-2" style="font-family:'Syne',sans-serif;">Study<span class="grad">Sync</span></div>
    <p class="text-slate-400">Create your free account and start studying smarter.</p>
  </div>

  <div class="flex flex-col gap-4">
    <div>
      <label class="text-sm text-slate-400 mb-1 block">Full Name</label>
      <input type="text" id="name" placeholder="Your Name" />
    </div>
    <div>
      <label class="text-sm text-slate-400 mb-1 block">Email</label>
      <input type="email" id="email" placeholder="you@email.com" />
    </div>
    <div>
      <label class="text-sm text-slate-400 mb-1 block">Password</label>
      <input type="password" id="password" placeholder="At least 6 characters" />
    </div>
    <p class="error" id="errorMsg"></p>
    <p class="success" id="successMsg">Account created! Redirecting to login...</p>
    <button class="btn" onclick="handleSignup()">Create Account</button>
  </div>

  <p class="text-center text-slate-500 text-sm mt-6">
    Already have an account? <a href="login.html" class="text-emerald-400 hover:underline">Log in</a>
  </p>
</div>

<script>
async function handleSignup() {
  const name = document.getElementById('name').value.trim();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value.trim();
  const errorMsg = document.getElementById('errorMsg');
  const successMsg = document.getElementById('successMsg');
  errorMsg.style.display = 'none';
  successMsg.style.display = 'none';

  if (!name || !email || !password) {
    errorMsg.textContent = 'Please fill in all fields.';
    errorMsg.style.display = 'block';
    return;
  }

  if (password.length < 6) {
    errorMsg.textContent = 'Password must be at least 6 characters.';
    errorMsg.style.display = 'block';
    return;
  }

  try {
    const res = await fetch('http://localhost:8080/api/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, email, password })
    });
    const data = await res.json();

    if (data.success) {
      successMsg.style.display = 'block';
      setTimeout(() => { window.location.href = 'login.html'; }, 1500);
    } else {
      errorMsg.textContent = data.message || 'Registration failed.';
      errorMsg.style.display = 'block';
    }
  } catch (err) {
    errorMsg.textContent = 'Cannot connect to server. Is the backend running?';
    errorMsg.style.display = 'block';
  }
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') handleSignup(); });
</script>
</body>
</html>
