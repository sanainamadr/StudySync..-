<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tasks — StudySync</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'DM Sans', sans-serif; background: #0f172a; color: #e2e8f0; min-height:100vh; }
    .grad { background: linear-gradient(135deg, #6ee7b7, #3b82f6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .card { background: #1e293b; border: 1px solid #334155; border-radius: 1rem; }
    .nav { background:#1e293b; border-bottom:1px solid #334155; padding:1rem 2rem; display:flex; align-items:center; justify-content:space-between; }
    .nav-links a { color:#94a3b8; font-size:0.9rem; text-decoration:none; padding: 0.4rem 0.9rem; border-radius:0.5rem; transition:all 0.2s; }
    .nav-links a:hover, .nav-links a.active { color:#6ee7b7; background:#0f172a; }
    input, select, textarea { background: #0f172a; border: 1px solid #334155; border-radius: 0.625rem; padding: 0.65rem 1rem; color:#e2e8f0; outline:none; transition: border 0.2s; }
    input:focus, select:focus { border-color: #6ee7b7; }
    .btn-add { background: linear-gradient(135deg, #6ee7b7, #3b82f6); color:#0f172a; font-weight:700; padding:0.65rem 1.25rem; border-radius:0.625rem; cursor:pointer; border:none; }
    .badge { display:inline-block; padding:0.15rem 0.6rem; border-radius:999px; font-size:0.72rem; font-weight:600; }
    .badge-high { background:#fee2e2; color:#991b1b; }
    .badge-medium { background:#fef9c3; color:#854d0e; }
    .badge-low { background:#dcfce7; color:#166534; }
    .task-row { display:flex; align-items:center; gap:0.75rem; padding:0.85rem 0; border-bottom:1px solid #334155; }
    .task-row:last-child { border-bottom: none; }
    .icon-btn { background:none; border:none; cursor:pointer; padding:0.25rem; border-radius:0.375rem; transition:background 0.2s; }
    .icon-btn:hover { background:#334155; }
    .filter-btn { padding:0.35rem 0.9rem; border-radius:0.5rem; font-size:0.82rem; cursor:pointer; border:none; transition:all 0.2s; }
    .filter-btn.active { background:#6ee7b7; color:#0f172a; font-weight:700; }
    .filter-btn:not(.active) { background:#334155; color:#94a3b8; }
  </style>
</head>
<body>

<nav class="nav">
  <div style="font-family:'Syne',sans-serif;" class="font-black text-xl">Study<span class="grad">Sync</span></div>
  <div class="nav-links flex gap-1">
    <a href="dashboard.html">Dashboard</a>
    <a href="timer.html">Timer</a>
    <a href="tasks.html" class="active">Tasks</a>
    <a href="notes.html">Notes</a>
    <a href="profile.html">Profile</a>
  </div>
  <button onclick="logout()" class="text-slate-500 hover:text-red-400 text-sm transition">Logout</button>
</nav>

<div class="max-w-3xl mx-auto px-6 py-10">
  <h1 class="text-3xl font-black mb-2" style="font-family:'Syne',sans-serif;">Task <span class="grad">Manager</span></h1>
  <p class="text-slate-400 mb-6">Add and manage your study tasks.</p>

  <!-- Add task form -->
  <div class="card p-5 mb-6">
    <h2 class="font-bold mb-4">Add New Task</h2>
    <div class="flex flex-col gap-3">
      <input type="text" id="taskTitle" placeholder="Task title (e.g. Read Chapter 5)" class="w-full" />
      <input type="text" id="taskDesc" placeholder="Description (optional)" class="w-full" />
      <div class="flex gap-3">
        <select id="taskPriority" class="flex-1">
          <option value="medium">🟡 Medium priority</option>
          <option value="high">🔴 High priority</option>
          <option value="low">🟢 Low priority</option>
        </select>
        <button class="btn-add" onclick="addTask()">+ Add Task</button>
      </div>
    </div>
    <p class="text-red-400 text-sm mt-2" id="taskError" style="display:none"></p>
  </div>

  <!-- Filters -->
  <div class="flex gap-2 mb-4">
    <button class="filter-btn active" id="filterAll" onclick="setFilter('all')">All</button>
    <button class="filter-btn" id="filterPending" onclick="setFilter('pending')">Pending</button>
    <button class="filter-btn" id="filterDone" onclick="setFilter('done')">Completed</button>
  </div>

  <!-- Task list -->
  <div class="card p-5">
    <div id="taskList">
      <p class="text-slate-500 text-sm text-center py-4">Loading tasks...</p>
    </div>
  </div>
</div>

<script>
const userId = localStorage.getItem('userId');
if (!userId) window.location.href = 'login.html';

let allTasks = [];
let currentFilter = 'all';

async function loadTasks() {
  try {
    const res = await fetch(`http://localhost:8080/api/tasks/${userId}`);
    allTasks = await res.json();
    renderTasks();
  } catch (e) {
    document.getElementById('taskList').innerHTML = '<p class="text-red-400 text-sm">Failed to load tasks. Is backend running?</p>';
  }
}

function renderTasks() {
  let tasks = allTasks;
  if (currentFilter === 'pending') tasks = allTasks.filter(t => !t.completed);
  if (currentFilter === 'done') tasks = allTasks.filter(t => t.completed);

  const el = document.getElementById('taskList');
  if (tasks.length === 0) {
    el.innerHTML = `<p class="text-slate-500 text-sm text-center py-4">${currentFilter === 'done' ? 'No completed tasks yet.' : 'No tasks. Add one above!'}</p>`;
    return;
  }

  el.innerHTML = tasks.map(t => `
    <div class="task-row">
      <button class="icon-btn text-xl" onclick="toggleTask(${t.id}, ${t.completed})" title="${t.completed ? 'Mark incomplete' : 'Mark complete'}">
        ${t.completed ? '✅' : '⬜'}
      </button>
      <div class="flex-1 min-w-0">
        <div class="font-medium ${t.completed ? 'line-through text-slate-500' : ''}">${t.title}</div>
        ${t.description ? `<div class="text-slate-400 text-sm truncate">${t.description}</div>` : ''}
      </div>
      <span class="badge badge-${t.priority}">${t.priority}</span>
      <button class="icon-btn text-red-400 hover:text-red-300" onclick="deleteTask(${t.id})" title="Delete">🗑</button>
    </div>
  `).join('');
}

async function addTask() {
  const title = document.getElementById('taskTitle').value.trim();
  const description = document.getElementById('taskDesc').value.trim();
  const priority = document.getElementById('taskPriority').value;
  const err = document.getElementById('taskError');
  err.style.display = 'none';

  if (!title) {
    err.textContent = 'Task title is required.';
    err.style.display = 'block';
    return;
  }

  try {
    const res = await fetch('http://localhost:8080/api/tasks', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ userId: parseInt(userId), title, description, priority, completed: false })
    });
    const task = await res.json();
    allTasks.push(task);
    document.getElementById('taskTitle').value = '';
    document.getElementById('taskDesc').value = '';
    renderTasks();
  } catch (e) {
    err.textContent = 'Failed to add task. Is backend running?';
    err.style.display = 'block';
  }
}

async function toggleTask(id, completed) {
  try {
    const res = await fetch(`http://localhost:8080/api/tasks/${id}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ completed: !completed })
    });
    const updated = await res.json();
    allTasks = allTasks.map(t => t.id === id ? updated : t);
    renderTasks();
  } catch (e) { console.error('Toggle failed', e); }
}

async function deleteTask(id) {
  if (!confirm('Delete this task?')) return;
  try {
    await fetch(`http://localhost:8080/api/tasks/${id}`, { method: 'DELETE' });
    allTasks = allTasks.filter(t => t.id !== id);
    renderTasks();
  } catch (e) { console.error('Delete failed', e); }
}

function setFilter(f) {
  currentFilter = f;
  ['all','pending','done'].forEach(k => {
    document.getElementById('filter' + k.charAt(0).toUpperCase() + k.slice(1)).classList.toggle('active', k === f);
  });
  renderTasks();
}

function logout() { localStorage.clear(); window.location.href = 'login.html'; }

loadTasks();
</script>
</body>
</html>
