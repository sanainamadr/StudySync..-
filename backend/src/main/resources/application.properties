# =============================================
#   StudySync - Spring Boot Configuration
# =============================================

# Server port
server.port=8080

# ---- MySQL Database ----
spring.datasource.url=jdbc:mysql://localhost:3306/studysync?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root

# ---- JPA / Hibernate ----
# update = auto creates/updates tables from your Java models
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ---- Disable Spring Security default login page ----
spring.security.user.name=admin
spring.security.user.password=admin
